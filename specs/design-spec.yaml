# Design Specification
system:
  name: Gym Schedule System
  architecture:
    database: Google Sheets
    backend: Google Apps Script
    input_layer: Google Forms
    source_of_truth:
      - specs/form-fields.yaml # Column names and form field definitions
      - specs/gym-schedules.yaml # Gym class schedules and instructor matrix

features:
  - id: f_new_user
    name: New User Registration
    description:
      actor: Admin
      trigger: Form submission (Sheet matching CONFIG.USERS.SHEET_NAME)
      action: Create user record and sync system state
      functions_used:
        - masterFormRouter(e): Relays submission based on sheet name
        - onMemberSignup(event): Core registration handler
        - getFieldValue(event, fieldMapping, key): Case-insensitive extraction
        - updateMemberDropdown(): Syncs user name to payment form dropdown
      api_calls:
        - CalendarApp.createAllDayEventSeries: Schedules yearly birthday event
        - CalendarApp.createAllDayEvent: Schedules 1-year anniversary event
        - FormApp.openById: Updates payment form choice values
      schemas:
        config_reference: CONFIG.USERS
        field_mapping:
          Nombre: name
          Correo: email
          Telefono: phone
          Cumpleaños: birthdayString
      validation: Silently skips writing if email is duplicated
      data:
        - name
        - email
        - phone
        - emergency_contact
  
  - id: f_new_user_payment
    name: New User Payment
    description:
      actor: Admin
      trigger: Form submission (Sheet matching CONFIG.PAYMENTS.SHEET_NAME)
      action: Update payment status and schedule expiration
      functions_used:
        - masterFormRouter(e): Relays submission based on sheet name
        - onPaymentSubmit(event): Core payment handler
        - getFieldValue(event, fieldMapping, key): Case-insensitive extraction
      api_calls:
        - CalendarApp.createAllDayEvent: Schedules membership expiry event based on duration
        - CalendarApp.createAllDayEvent: Schedules 7-day pre-expiry reminder event
      schemas:
        config_reference: CONFIG.PAYMENTS
        field_mapping:
          Nombre: nombre
          Valor: valor
          Tipo de membresía: tipo de membresía
          Metodo: metodo
          Fecha de inicio: fechaInicioStr
      validation: Requires valid date format for Fecha de inicio, else skips scheduling
      data:
        - user_id (dropdown)
        - payment_amount
        - credits_purchased
      
  - id: f_admin_initial_schedule
    name: Initial Schedule Assignment
    description:
      actor: Admin
      trigger: Form submission (Sheet matching CONFIG.ASIGNACION.SHEET_NAME)
      action: Assign initial classes
      structure:
        - page_1: "User and Day Router: Dropdown selection for Day with 'Go to section based on answer' logic."
        - page_2_plus: "Time Slot Router: Dropdown selection for Time with 'Go to section based on answer' logic, branching from the chosen Day."
        - page_3_plus: "Instructor Selection: Dropdown showing only valid instructors for the chosen Day and Time based on the availability matrix."
      functions_used:
        - onScheduleSubmit(event): Core scheduling handler
      api_calls: []
      future_implementation:
        - CalendarApp.createEvent: Schedule individual class calendar events per user (nice-to-have, not prioritized)
      schemas:
        config_reference: CONFIG.ASIGNACION
        field_mapping:
          Usuario: user_id
          Día: day
          Horario: timeSlot
          Instructor: instructor
        schedule_source: specs/gym-schedules.yaml
      validation: None initially (capacity validation is bypassed, allowing temporary overbooking risk)
      data:
        - user_id (dropdown)
        - day (dropdown)
        - timeSlot (dropdown)
        - instructor (dropdown)
  
  - id: f_admin_attendance
    name: Class Attendance
    description:
      actor: Admin
      trigger: Form submission (Sheet matching CONFIG.ATTENDANCE.SHEET_NAME)
      action: Record attendance per instructor and update user credits
      structure:
        - page_1: "Class Router: Dropdown selection with 'Go to section based on answer' logic."
        - page_2_plus: "Instructor Attendance Grid: One Checkbox Grid per instructor in that class. Rows are student names; column is 'Asistió'."
      functions_used:
        - onAttendanceSubmit(event): Core attendance handler
        - deductCredits(user_id): Reduces user's available class credits
      api_calls:
        - SpreadsheetApp.getRange.setValues: Appends attendance record to sheet
      schemas:
        config_reference: CONFIG.ATTENDANCE
        field_mapping:
          Clase: class_id
          "Asistencia - [Instructor Name]": present_users
      validation: Fails silently if user has zero remaining credits
      data:
        - class_id (dropdown)
        - present_users (checkbox grid per instructor)
    
  - id: f_admin_modify_schedule
    name: Modify User Schedule
    description:
      actor: Admin
      trigger: Form submission (Sheet matching CONFIG.MODIFY.SHEET_NAME)
      action: Alter class bookings (Swap one class for another)
      functions_used:
        - onModifyScheduleSubmit(event): Core modification handler
        - masterFormRouter(e): Relays submission based on sheet name
      api_calls:
        - CalendarApp.getEventById.deleteEvent: Cancels existing class reservation
        - CalendarApp.createEvent: Schedules new replacement class
      schemas:
        config_reference: CONFIG.MODIFY
        field_mapping:
          Nombre: user_id
          Clase Actual: old_class_info
          Nueva Fecha: new_class_date
          Nuevo Horario: new_class_time
          Nuevo Instructor: new_class_instructor
      validation: Rejects removal if class is in the past; rejects addition if class is full
      data:
        - user_id (dropdown)
        - old_class_info
        - new_class_date
        - new_class_time
        - new_class_instructor

  - id: f_date_parsing
    name: Flexible Date Parsing
    description:
      actor: System
      trigger: Processing of form fields containing dates (e.g., START_DATE, BIRTHDAY)
      action: Parses varying date input strings into valid Date objects by splitting on multiple delimiters and standardizing from a D/M/Y sequence.
      functions_used:
        - onPaymentSubmit(event): Parses start date to calculate expiration and reminders
        - onMemberSignup(event): Parses birthday to schedule recurring yearly events
      api_calls: []
      schemas:
        supported_delimiters: "[-/.]"
        expected_format: "Day/Month/Year or Day/Month"
      validation: Checks minimum array length (>= 2) and validates !isNaN(date.getTime()) before processing
      data:
        - input_date_string
        - parsed_date_object
