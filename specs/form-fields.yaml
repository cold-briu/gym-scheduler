# Google Sheets & Forms Field Source of Truth
# This document serves as the absolute source of truth for all column names and form question titles.
# All schemas (src/schemas.js) and configurations (src/config.js) must derive from these definitions.

forms:
  usuarios:
    sheet_name: Usuarios
    fields:
      Nombre:
        internal_key: name
        type: Short answer
        description: Full name of the member
      Correo:
        internal_key: email
        type: Short answer
        description: Email address for communication
      Cumpleaños:
        internal_key: birthdayString
        type: Date
        format: DD/MM/YYYY
        description: Member's birthday for anniversary events
      Telefono:
        internal_key: phone
        type: Short answer
        description: Contact phone number

  pagos:
    sheet_name: Pagos
    fields:
      Nombre:
        internal_key: name
        type: Dropdown
        description: Member name (dynamically updated from Usuarios sheet)
      Valor:
        internal_key: value
        type: Number
        description: Payment amount
      Tipo de membresía:
        internal_key: membershipType
        type: Multiple choice
        options:
          - Día de Escalada
          - Clase Dirigida
          - Mensualidad
          - Mensualidad Dirigida
          - Trimestre Mensualidad
          - Semestre Mensualidad
          - Anualidad Mensualidad
          - Curso Básico
          - Curso Avanzado
      Metodo:
        internal_key: method
        type: Multiple choice
        options:
          - Transferencia
          - Efectivo
  asistencia:
    sheet_name: Asistencia
    fields:
      Clase:
        internal_key: class_id
        type: Dropdown
        description: "The Class Router (Page 1). Uses 'Go to section based on answer'. Choosing a class sends the Admin to its specific section."
        options: "Dynamically populated from Horarios sheet"
      "Asistencia - [Instructor]":
        internal_key: present_users
        type: Checkbox Grid
        description: "The Instructor Attendance Grid (Page 2+). One per instructor available in the selected class."
        columns:
          - Asistió
        rows: "Pre-filled/Restricted list of Student Names officially signed up for that specific instructor's class."
        logic: "Updated via script based on 'Inscritos' in Horarios/Enrolled per Class sheet."
  cambio_horario:
    sheet_name: Cambios
    fields:
      Nombre:
        internal_key: name
        type: Dropdown
        description: Member name (dynamically updated from Usuarios sheet)
      Clase Actual:
        internal_key: old_class_info
        type: Dropdown
        description: "The specific class reservation to be removed. Example: 'Miércoles mayo 02 : 14-16 - Instructor A'"
        logic: "Dynamically populated with the user's upcoming class reservations."
      Nueva Fecha:
        internal_key: new_class_date
        type: Date
        format: DD/MM/YYYY
        description: "The date for the new class session."
      Nuevo Horario:
        internal_key: new_class_time
        type: Dropdown
        description: "The time slot for the new class. Example: 'Viernes 18-20'"
      Nuevo Instructor:
        internal_key: new_class_instructor
        type: Dropdown
        description: "The instructor for the new class."
  asignacion_inicial:
    sheet_name: Asignacion Inicial
    fields:
      Usuario:
        internal_key: user_id
        type: Dropdown
        description: Member name (dynamically updated from Usuarios sheet)
      Día:
        internal_key: day
        type: Dropdown
        description: "Day of the week (Page 1). Uses 'Go to section based on answer' to route to the correct time slots for that day."
        options:
          - Lunes
          - Martes
          - Miércoles
          - Jueves
          - Viernes
          - Sábado
      Horario:
        internal_key: timeSlot
        type: Dropdown
        description: "Time frame for the selected day (Page 2+). One section per Day. Uses 'Go to section based on answer' to route to available instructors."
      Instructor:
        internal_key: instructor
        type: Dropdown
        description: "Available instructors for the chosen Day and Time (Page 3+). One section per Time Slot. Only shows instructors defined in the availability matrix for that specific time."

