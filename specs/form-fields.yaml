# Google Sheets & Forms Field Source of Truth
# This document serves as the absolute source of truth for all column names and form question titles.
# All schemas (src/schemas.js) and configurations (src/config.js) must derive from these definitions.

forms:
  usuarios:
    sheet_name: Usuarios
    fields:
      Nombre:
        internal_key: name
        type: Short answer
        description: Full name of the member
      Correo:
        internal_key: email
        type: Short answer
        description: Email address for communication
      Cumpleaños:
        internal_key: birthdayString
        type: Date
        format: DD/MM/YYYY
        description: Member's birthday for anniversary events
      Telefono:
        internal_key: phone
        type: Short answer
        description: Contact phone number

  pagos:
    sheet_name: Pagos
    fields:
      Nombre:
        internal_key: name
        type: Dropdown
        description: Member name (dynamically updated from Usuarios sheet)
      Valor:
        internal_key: value
        type: Number
        description: Payment amount
      Tipo de membresía:
        internal_key: membershipType
        type: Multiple choice
        options:
          - Día de Escalada
          - Clase Dirigida
          - Mensualidad
          - Mensualidad Dirigida
          - Trimestre Mensualidad
          - Semestre Mensualidad
          - Anualidad Mensualidad
          - Curso Básico
          - Curso Avanzado
      Metodo:
        internal_key: method
        type: Multiple choice
        options:
          - Transferencia
          - Efectivo
  asistencia:
    sheet_name: Asistencia
    fields:
      Clase:
        internal_key: class_id
        type: Dropdown
        description: "The Class Router (Page 1). Uses 'Go to section based on answer'. Choosing a class sends the Admin to its specific section."
        options: "Dynamically populated from Horarios sheet"
      "Asistencia - [Instructor]":
        internal_key: present_users
        type: Checkbox Grid
        description: "The Instructor Attendance Grid (Page 2+). One per instructor available in the selected class."
        columns:
          - Asistió
        rows: "Pre-filled/Restricted list of Student Names officially signed up for that specific instructor's class."
        logic: "Updated via script based on 'Inscritos' in Horarios/Enrolled per Class sheet."
